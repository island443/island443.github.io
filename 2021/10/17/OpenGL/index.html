              <h5 id="OpenGL绘制茶壶"><a href="#OpenGL绘制茶壶" class="headerlink" title="OpenGL绘制茶壶"></a>OpenGL绘制茶壶</h5><figure class="highlight reasonml"><table><tr><td class="gutter hljs"><div class="hljs code-wrapper"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br></pre></div></td><td class="code"><div class="hljs code-wrapper"><pre><code class="hljs reasonml">#<span class="hljs-keyword">include</span> <span class="hljs-string">&quot;stdio.h&quot;</span><br><br>#<span class="hljs-keyword">include</span> <span class="hljs-string">&quot;windows.h&quot;</span><br>#<span class="hljs-keyword">include</span> &lt;glut.h&gt;<br>#<span class="hljs-keyword">include</span> &lt;stdlib.h&gt;<br><br><span class="hljs-comment">//对OpenGL进行初始设置，包括清除屏幕使用的颜色，使用glColor3f(1.0,0.0,0.0)设置茶壶的颜色为红色。</span><br><br><span class="hljs-comment">//颜色设置中设置色彩值范围从0.0到1.0,    0.0f表示最黑，1.0f表示最亮</span><br><br><span class="hljs-comment">//glClearColor后的第一个参数是Red Intensity（红色分量），第二个是绿色分量，第三个是蓝色分量，第四个</span><br><span class="hljs-comment">//是Alpha值代表透明度，因此使用glClearColor（0.0,0.0,0.0,0.0）时，系统将用黑色清除屏幕</span><br><br>void init<span class="hljs-literal">()</span> &#123;   <span class="hljs-comment">//此处开始对OpenGL进行所有配置</span><br>	gl<span class="hljs-constructor">ClearColor(0.0, 0.0, 0.0, 0.0)</span>;   <span class="hljs-comment">//黑色背景</span><br>	gl<span class="hljs-constructor">Color3f(1.0, 0.0, 0.0)</span>;   <span class="hljs-comment">//设置茶壶为红色</span><br>&#125;<br><br><br><span class="hljs-comment">//以下是所有的绘制代码，任何想在屏幕中显示的内容都可以通过此段代码来实现，使用glClear(GL_COLOR_BUFFER_BIT)</span><br><span class="hljs-comment">//清除颜色缓存，然后使用glut辅助函数库glutWireTeapot绘制一个线框茶壶</span><br>void display<span class="hljs-literal">()</span> &#123;	<span class="hljs-comment">//从这里开始进行所有的绘制</span><br>	gl<span class="hljs-constructor">Clear(GL_COLOR_BUFFER_BIT)</span>;	<span class="hljs-comment">//清除屏幕中的内容</span><br>	glut<span class="hljs-constructor">WireTeapot(0.8)</span>; <span class="hljs-comment">//绘制茶壶</span><br>	gl<span class="hljs-constructor">Flush()</span>;<br>&#125;<br><br><br><span class="hljs-comment">//重置OpenGL窗口大小，不管窗口大小是否已经改变，它都将以透视图的方式运行，场景尺寸被设置成它显示时</span><br><span class="hljs-comment">//所在窗口大小</span><br>void my<span class="hljs-constructor">Reshape(GLsizei <span class="hljs-params">w</span>, GLsizei <span class="hljs-params">h</span>)</span> &#123; <span class="hljs-comment">//重置OpenGL窗口大小</span><br>	gl<span class="hljs-constructor">Viewport(0, 0, <span class="hljs-params">w</span>, <span class="hljs-params">h</span>)</span>;   <span class="hljs-comment">//重置当前的视口</span><br>	gl<span class="hljs-constructor">MatrixMode(GL_PROJECTION)</span>;  <span class="hljs-comment">//选择投影矩阵</span><br>	gl<span class="hljs-constructor">LoadIdentity()</span>;	<span class="hljs-comment">//重置投影矩阵</span><br>	<span class="hljs-keyword">if</span> (w &lt;= h)<br>		gl<span class="hljs-constructor">Ortho(-1.5, 1.5, -1.5 <span class="hljs-operator">*</span> (GLfloat)</span>h<span class="hljs-operator"> / </span>(GLfloat)w, <span class="hljs-number">1.50</span><span class="hljs-operator"> * </span>(GLfloat)h<span class="hljs-operator"> / </span>(GLfloat)w, -<span class="hljs-number">10.0</span>, <span class="hljs-number">10.0</span>);<br>	<span class="hljs-keyword">else</span><br>		gl<span class="hljs-constructor">Ortho(-1.5 <span class="hljs-operator">*</span> (GLfloat)</span>w<span class="hljs-operator"> / </span>(GLfloat)h, <span class="hljs-number">1.5</span><span class="hljs-operator"> * </span>(GLfloat)w<span class="hljs-operator"> / </span>(GLfloat)h, -<span class="hljs-number">1.5</span>, <span class="hljs-number">1.5</span>, -<span class="hljs-number">10.0</span>, <span class="hljs-number">10.0</span>);<br>	gl<span class="hljs-constructor">MatrixMode(GL_MODELVIEW)</span>;<br>	gl<span class="hljs-constructor">LoadIdentity()</span>;<br>&#125;<br><br><br><span class="hljs-comment">//下面的main()函数是整个程序的入口函数，通过函数调用的方式进行程序初始化后，设置单缓存，屏幕显示色彩</span><br><span class="hljs-comment">//方式为RGB模式，窗口大小为（500,500），并定义窗口的初始位置，最后调用显示函glutDisplayFunc(display)将茶壶显示出来</span><br><br><span class="hljs-built_in">int</span> main(<span class="hljs-built_in">int</span> argc,<span class="hljs-built_in">char</span>**argv) &#123;<br><br>	glut<span class="hljs-constructor">Init(&amp;<span class="hljs-params">argc</span>, <span class="hljs-params">argv</span>)</span>;<br><br>	<span class="hljs-comment">//设置窗口显示模式为RGB方式，即彩色方式，并将图形缓存设为单缓存</span><br>	glut<span class="hljs-constructor">InitDisplayMode(GLUT_SINGLE | GLUT_RGB)</span>;<br>	glut<span class="hljs-constructor">InitWindowSize(500, 500)</span>;	<span class="hljs-comment">//定义窗口的宽度高，度</span><br>	glut<span class="hljs-constructor">InitWindowPosition(0, 0)</span>;	<span class="hljs-comment">//定义窗口的初始位置</span><br>	glut<span class="hljs-constructor">CreateWindow(<span class="hljs-string">&quot;OpenGL程序&quot;</span>)</span>;<br>	init<span class="hljs-literal">()</span>;<br>	glut<span class="hljs-constructor">ReshapeFunc(<span class="hljs-params">myReshape</span>)</span>;<br>	glut<span class="hljs-constructor">DisplayFunc(<span class="hljs-params">display</span>)</span>;<br>	glut<span class="hljs-constructor">MainLoop()</span>;<br>	return <span class="hljs-number">0</span>;<br>&#125;<br><br><br></code></pre></div></td></tr></table></figure>
